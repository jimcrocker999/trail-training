<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jim's Trail Training</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --forest:    #1B4332;
    --pine:      #2C5F2E;
    --sage:      #52796F;
    --mist:      #84A98C;
    --gold:      #D4A017;
    --amber:     #E8C547;
    --stone:     #F4F1EC;
    --parchment: #FDFBF7;
    --ink:       #1C1C1C;
    --bark:      #5C4033;
    --sky:       #2E6DA4;
    --cream:     #FAF7F0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Topography background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(44,95,46,0.04) 39px, rgba(44,95,46,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(44,95,46,0.02) 39px, rgba(44,95,46,0.02) 40px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  .app-header {
    background: var(--forest);
    color: white;
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.3px;
    line-height: 1.1;
  }

  .app-subtitle {
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .date-display {
    text-align: right;
    flex-shrink: 0;
  }

  .date-day {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--amber);
    line-height: 1;
  }

  .date-month {
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Nav tabs ── */
  .nav-tabs {
    display: flex;
    gap: 4px;
    margin-top: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    background: none;
    border: none;
    color: var(--mist);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 6px 14px 10px;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }

  .nav-tab.active {
    color: var(--amber);
    border-bottom-color: var(--amber);
  }

  /* ── Main content ── */
  .content {
    position: relative;
    z-index: 1;
    padding: 20px 16px 100px;
    max-width: 680px;
    margin: 0 auto;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ── Today Card ── */
  .today-card {
    background: var(--forest);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(27,67,50,0.25);
  }

  .today-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .today-phase-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .today-weekday {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: white;
    line-height: 1.1;
  }

  .today-date-full {
    font-size: 12px;
    color: var(--mist);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .today-workout {
    padding: 20px;
  }

  .workout-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mist);
    margin-bottom: 8px;
  }

  .workout-name {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--amber);
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .workout-detail {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
  }

  .workout-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }

  .workout-tag {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* ── Encouragement Card ── */
  .encouragement-card {
    background: var(--cream);
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .encouragement-card::before {
    content: '"';
    position: absolute;
    top: -10px;
    left: 14px;
    font-family: 'Playfair Display', serif;
    font-size: 100px;
    color: var(--amber);
    opacity: 0.15;
    line-height: 1;
  }

  .encouragement-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .encouragement-text {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-style: italic;
    color: var(--forest);
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  /* ── Week overview ── */
  .week-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 1px solid rgba(44,95,46,0.1);
  }

  .week-card-header {
    background: var(--pine);
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .week-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: white;
  }

  .week-card-phase {
    font-size: 10px;
    color: var(--mist);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .week-days {
    display: flex;
    flex-direction: column;
  }

  .week-day-row {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    transition: background 0.15s;
  }

  .week-day-row:last-child { border-bottom: none; }
  .week-day-row.today-row { background: rgba(44,95,46,0.05); }
  .week-day-row.rest-row { opacity: 0.55; }

  .day-label {
    width: 42px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 6px;
    border-right: 1px solid rgba(0,0,0,0.05);
  }

  .day-abbr {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--sage);
  }

  .day-num {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--forest);
    line-height: 1;
    margin-top: 2px;
  }

  .day-num.today-num {
    background: var(--pine);
    color: white;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }

  .day-content {
    flex: 1;
    padding: 10px 14px;
  }

  .day-activity {
    font-size: 13px;
    font-weight: 500;
    color: var(--forest);
    line-height: 1.3;
  }

  .day-detail {
    font-size: 11px;
    color: var(--sage);
    margin-top: 2px;
    line-height: 1.4;
  }

  .day-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    align-self: center;
    margin-right: 14px;
    flex-shrink: 0;
  }

  /* ── Schedule View ── */
  .schedule-phase {
    margin-bottom: 28px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid currentColor;
  }

  .phase-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .phase-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
  }

  .phase-dates {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    opacity: 0.7;
    margin-left: auto;
  }

  .phase-weeks {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .schedule-week-row {
    background: white;
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .schedule-week-row.current-week {
    border-color: var(--pine);
    box-shadow: 0 0 0 2px rgba(44,95,46,0.15);
  }

  .schedule-week-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .current-badge {
    background: var(--pine);
    color: white;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.5px;
  }

  .schedule-week-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .sched-day {
    text-align: center;
    padding: 4px 2px;
  }

  .sched-day-label {
    font-size: 9px;
    color: var(--sage);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }

  .sched-day-activity {
    font-size: 10px;
    color: var(--forest);
    line-height: 1.3;
    font-weight: 500;
  }

  /* ── Trips View ── */
  .trip-card {
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
  }

  .trip-card-hero {
    background: var(--forest);
    padding: 24px 20px 20px;
    position: relative;
    overflow: hidden;
  }

  .trip-card-hero::after {
    content: '';
    position: absolute;
    bottom: -20px;
    right: -20px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .trip-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--forest);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .trip-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .trip-dates {
    font-size: 13px;
    color: var(--mist);
  }

  .trip-countdown {
    margin-top: 14px;
    display: flex;
    gap: 16px;
  }

  .countdown-item {
    text-align: center;
  }

  .countdown-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--amber);
    line-height: 1;
  }

  .countdown-label {
    font-size: 10px;
    color: var(--mist);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .trip-card-details {
    background: white;
    padding: 16px 20px;
  }

  .trip-detail-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    font-size: 13px;
  }

  .trip-detail-row:last-child { border-bottom: none; }
  .trip-detail-label { color: var(--sage); font-weight: 500; }
  .trip-detail-value { color: var(--forest); font-weight: 600; text-align: right; }

  /* ── Progress bar ── */
  .progress-section {
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 1px solid rgba(44,95,46,0.1);
  }

  .progress-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 14px;
  }

  .progress-item {
    margin-bottom: 14px;
  }

  .progress-item:last-child { margin-bottom: 0; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
  }

  .progress-name { font-weight: 600; color: var(--forest); }
  .progress-pct { color: var(--sage); }

  .progress-bar-bg {
    height: 6px;
    background: rgba(0,0,0,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }

  /* ── Altitude tips ── */
  .tips-card {
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border-left: 4px solid var(--sky);
  }

  .tips-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--sky);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tips-text {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.6;
  }

  /* ── Phase color system ── */
  .phase-p1  { color: #2C5F2E; }
  .phase-p2  { color: #1565C0; }
  .phase-p3  { color: #8B6914; }
  .phase-trip { color: #1B4332; }
  .phase-p4  { color: #6A1E55; }
  .phase-p5  { color: #B71C1C; }
  .phase-p6  { color: #00695C; }
  .phase-vac { color: #5D4037; }

  .dot-p1   { background: #2C5F2E; }
  .dot-p2   { background: #1565C0; }
  .dot-p3   { background: #8B6914; }
  .dot-trip { background: #1B4332; }
  .dot-p4   { background: #6A1E55; }
  .dot-p5   { background: #B71C1C; }
  .dot-p6   { background: #00695C; }
  .dot-vac  { background: #5D4037; }
  .dot-rest { background: #CCCCCC; }

  .badge-p1   { background: rgba(44,95,46,0.15);   color: #2C5F2E; }
  .badge-p2   { background: rgba(21,101,192,0.15); color: #1565C0; }
  .badge-p3   { background: rgba(139,105,20,0.15); color: #8B6914; }
  .badge-trip { background: rgba(27,67,50,0.15);   color: #1B4332; }
  .badge-p4   { background: rgba(106,30,85,0.15);  color: #6A1E55; }
  .badge-p5   { background: rgba(183,28,28,0.15);  color: #B71C1C; }
  .badge-p6   { background: rgba(0,105,92,0.15);   color: #00695C; }
  .badge-vac  { background: rgba(93,64,55,0.15);   color: #5D4037; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--sage);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.5; }

  /* ── Responsive ── */
  @media (min-width: 480px) {
    .app-title { font-size: 26px; }
    .today-weekday { font-size: 32px; }
    .workout-name { font-size: 28px; }
    .content { padding: 24px 24px 100px; }
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .view.active > * {
    animation: fadeUp 0.4s ease both;
  }
  .view.active > *:nth-child(2) { animation-delay: 0.05s; }
  .view.active > *:nth-child(3) { animation-delay: 0.10s; }
  .view.active > *:nth-child(4) { animation-delay: 0.15s; }
  .view.active > *:nth-child(5) { animation-delay: 0.20s; }

</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div>
      <div class="app-title">Trail Training</div>
      <div class="app-subtitle">Indian Peaks · Trans-Sierra · 2026</div>
    </div>
    <div class="date-display">
      <div class="date-day" id="hdr-day"></div>
      <div class="date-month" id="hdr-month"></div>
    </div>
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showView('today')">Today</button>
    <button class="nav-tab" onclick="showView('week')">This Week</button>
    <button class="nav-tab" onclick="showView('schedule')">Full Schedule</button>
    <button class="nav-tab" onclick="showView('trips')">Trips</button>
  </nav>
</header>

<main class="content">

  <!-- ── TODAY VIEW ── -->
  <div class="view active" id="view-today">
    <div class="today-card" id="today-card">
      <div class="today-header">
        <div class="today-phase-badge" id="today-phase-badge"></div>
        <div class="today-weekday" id="today-weekday"></div>
        <div class="today-date-full" id="today-date-full"></div>
      </div>
      <div class="today-workout">
        <div class="workout-label">TODAY'S TRAINING</div>
        <div class="workout-name" id="today-activity"></div>
        <div class="workout-detail" id="today-detail"></div>
        <div class="workout-tags" id="today-tags"></div>
      </div>
    </div>

    <div class="encouragement-card">
      <div class="encouragement-label">✦ Daily Encouragement</div>
      <div class="encouragement-text" id="encouragement-text"></div>
    </div>

    <div class="progress-section">
      <div class="progress-title">Season Progress</div>
      <div id="progress-bars"></div>
    </div>
  </div>

  <!-- ── WEEK VIEW ── -->
  <div class="view" id="view-week">
    <div class="week-card" id="week-card">
      <div class="week-card-header">
        <div class="week-card-title" id="week-title"></div>
        <div class="week-card-phase" id="week-phase"></div>
      </div>
      <div class="week-days" id="week-days"></div>
    </div>
  </div>

  <!-- ── SCHEDULE VIEW ── -->
  <div class="view" id="view-schedule">
    <div id="schedule-content"></div>
  </div>

  <!-- ── TRIPS VIEW ── -->
  <div class="view" id="view-trips">
    <div id="trips-content"></div>
  </div>

</main>

<script>
// ════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════

const PHASES = [
  { id:'p1',  label:'Phase 1: Base Build',       dates:'Mar 13 – May 25',   color:'#2C5F2E', cls:'p1'  },
  { id:'vac', label:'Vacation',                  dates:'May 26 – Jun 6',    color:'#5D4037', cls:'vac' },
  { id:'p2',  label:'Phase 2: Build & Specificity', dates:'Jun 7 – Jul 12', color:'#1565C0', cls:'p2'  },
  { id:'p3',  label:'Phase 3: Peak & Taper',     dates:'Jul 13 – Jul 23',   color:'#8B6914', cls:'p3'  },
  { id:'drive1',label:'Drive to Colorado',        dates:'Jul 24–25',         color:'#37474F', cls:'trip'},
  { id:'trip1',label:'Indian Peaks Wilderness',   dates:'Jul 26 – Jul 29',   color:'#1B4332', cls:'trip'},
  { id:'drive2',label:'Drive Home',               dates:'Jul 30–31',         color:'#37474F', cls:'trip'},
  { id:'p4',  label:'Phase 4: Recovery',         dates:'Aug 1 – Aug 13',    color:'#6A1E55', cls:'p4'  },
  { id:'p5',  label:'Phase 5: Trans-Sierra Prep',dates:'Aug 14 – Aug 20',   color:'#B71C1C', cls:'p5'  },
  { id:'trip2',label:'Trans-Sierra Expedition',  dates:'Aug 21 – Aug 29',   color:'#1B4332', cls:'trip'},
  { id:'p6',  label:'Phase 6: Maintenance',      dates:'Sep 1 onward',      color:'#00695C', cls:'p6'  },

// Weekly schedule: each week has start date (Monday) and 7 days Sun=0..Sat=6 -> Mon-Sun array

function getToday() {
  return new Date();
}

function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  d.setHours(0,0,0,0);
  return d;
}

// Parse "Mar 13" style dates → Date object in 2026 (or 2027 if month < 3)
function parseDate(str, baseYear = 2026) {
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  if (!str || str.includes('–') || str.includes('Oct') && str.includes('Nov')) return null;
  const parts = str.trim().split(' ');
  if (parts.length < 2) return null;
  const mon = months[parts[0]];
  const day = parseInt(parts[1]);
  if (mon === undefined || isNaN(day)) return null;
  const year = (parts[0] === 'Mar' && baseYear === 2027) ? 2027 : baseYear;
  return new Date(year, mon, day);
}

// Get the week index for a given date
function getWeekIndex(date) {
  const weekStarts = WEEKS.map(w => {
    const dateStr = w.dates.split('–')[0].trim();
    return parseDate(dateStr);
  });
  let best = 0;
  for (let i = 0; i < weekStarts.length; i++) {
    if (!weekStarts[i]) continue;
    if (weekStarts[i] <= date) best = i;
    else break;
  }
  return best;
}

// Get phase config
function getPhase(phaseId) {
  return PHASES.find(p => p.id === phaseId) || PHASES[0];
}

// Get day of week index (0=Mon ... 6=Sun)
function getDayIndex(date) {
  const d = date.getDay();
  return d === 0 ? 6 : d - 1;
}

const WEEKDAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const WEEKDAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function formatFullDate(date) {
  return `${WEEKDAYS[getDayIndex(date)]}, ${MONTHS[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
}

function getDaysBetween(a, b) {
  return Math.ceil((b - a) / (1000 * 60 * 60 * 24));
}

// Consistent daily quote based on day-of-year
function getDailyQuote(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  const diff = date - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);
  return QUOTES[dayOfYear % QUOTES.length];
}

// Phase color helpers
function phaseColor(phaseId) {
  const p = getPhase(phaseId);
  return p ? p.color : '#2C5F2E';
}

function activityDotClass(activity, phase) {
  if (!activity || activity === 'Rest') return 'dot-rest';
  const p = PHASES.find(ph => ph.id === phase);
  return p ? `dot-${p.cls}` : 'dot-p1';
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════

function renderHeader() {
  const today = getToday();
  document.getElementById('hdr-day').textContent = today.getDate();
  document.getElementById('hdr-month').textContent = `${MONTHS_SHORT[today.getMonth()]} ${today.getFullYear()}`;
}

function renderToday() {
  const today = getToday();
  const weekIdx = getWeekIndex(today);
  const dayIdx = getDayIndex(today);
  const week = WEEKS[weekIdx];
  const phase = getPhase(week.phase);
  const dayData = week.days[dayIdx] || rest();

  // Phase badge
  const badge = document.getElementById('today-phase-badge');
  badge.textContent = phase.label;
  badge.className = `today-phase-badge badge-${phase.cls}`;

  document.getElementById('today-weekday').textContent = WEEKDAYS[dayIdx];
  document.getElementById('today-date-full').textContent = formatFullDate(today);
  document.getElementById('today-activity').textContent = dayData.activity;
  document.getElementById('today-detail').textContent = dayData.detail;

  const tagsEl = document.getElementById('today-tags');
  tagsEl.innerHTML = (dayData.tags || []).map(t =>
    `<span class="workout-tag">${t}</span>`
  ).join('');

  // Encouragement
  document.getElementById('encouragement-text').textContent = getDailyQuote(today);

  // Progress bars
  const trip1 = new Date(2026, 6, 26);
  const trip2 = new Date(2026, 7, 21);
  const planStart = new Date(2026, 2, 13);
  const totalDays = getDaysBetween(planStart, trip2);
  const elapsed = Math.max(0, getDaysBetween(planStart, today));
  const pct1 = Math.min(100, Math.round(elapsed / getDaysBetween(planStart, trip1) * 100));
  const pct2 = Math.min(100, Math.round(elapsed / totalDays * 100));
  const daysToTrip1 = Math.max(0, getDaysBetween(today, trip1));
  const daysToTrip2 = Math.max(0, getDaysBetween(today, trip2));

  document.getElementById('progress-bars').innerHTML = `
    <div class="progress-item">
      <div class="progress-label">
        <span class="progress-name">Indian Peaks (Jul 26)</span>
        <span class="progress-pct">${daysToTrip1 > 0 ? daysToTrip1 + ' days away' : 'On trail!'}</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct1}%;background:#2C5F2E"></div>
      </div>
    </div>
    <div class="progress-item">
      <div class="progress-label">
        <span class="progress-name">Trans-Sierra (Aug 21)</span>
        <span class="progress-pct">${daysToTrip2 > 0 ? daysToTrip2 + ' days away' : 'On trail!'}</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct2}%;background:#B71C1C"></div>
      </div>
    </div>
    <div class="progress-item">
      <div class="progress-label">
        <span class="progress-name">Season Progress</span>
        <span class="progress-pct">${Math.min(100,pct2)}% complete</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${Math.min(100,pct2)}%;background:#D4A017"></div>
      </div>
    </div>
  `;
}

function renderWeek() {
  const today = getToday();
  const weekIdx = getWeekIndex(today);
  const week = WEEKS[weekIdx];
  const phase = getPhase(week.phase);
  const todayDayIdx = getDayIndex(today);

  document.getElementById('week-title').textContent = `${week.label}  ·  ${week.dates}`;
  document.getElementById('week-phase').textContent = phase.label;

  // Figure out dates for Mon–Sun of this week
  const monday = getMondayOfWeek(today);

  const daysHtml = week.days.map((day, i) => {
    const dayDate = new Date(monday);
    dayDate.setDate(monday.getDate() + i);
    const isToday = i === todayDayIdx;
    const isRest = day.type === 'rest';

    return `
      <div class="week-day-row ${isToday ? 'today-row' : ''} ${isRest ? 'rest-row' : ''}">
        <div class="day-label">
          <div class="day-abbr">${WEEKDAYS_SHORT[i]}</div>
          <div class="${isToday ? 'day-num today-num' : 'day-num'}">${dayDate.getDate()}</div>
        </div>
        <div class="day-content">
          <div class="day-activity">${day.activity}</div>
          ${day.detail ? `<div class="day-detail">${day.detail}</div>` : ''}
        </div>
        <div class="day-dot ${activityDotClass(day.activity, week.phase)}"></div>
      </div>
    `;
  }).join('');

  document.getElementById('week-days').innerHTML = daysHtml;
}

function renderSchedule() {
  const today = getToday();
  const currentWeekIdx = getWeekIndex(today);

  // Group weeks by phase
  const phaseGroups = {};
  WEEKS.forEach((w, i) => {
    if (!phaseGroups[w.phase]) phaseGroups[w.phase] = [];
    phaseGroups[w.phase].push({ week: w, idx: i });
  });

  const html = PHASES.map(phase => {
    const weeks = phaseGroups[phase.id];
    if (!weeks || weeks.length === 0) return '';

    const weeksHtml = weeks.map(({ week, idx }) => {
      const isCurrent = idx === currentWeekIdx;
      const dayItems = week.days.map((d, di) =>
        `<div class="sched-day">
          <div class="sched-day-label">${WEEKDAYS_SHORT[di]}</div>
          <div class="sched-day-activity">${d.activity.replace('Gym: ','').replace('Cardio','Cardio').replace('Easy Walk','Walk').replace('Rest','—')}</div>
        </div>`
      ).join('');

      return `
        <div class="schedule-week-row ${isCurrent ? 'current-week' : ''}">
          <div class="schedule-week-label">
            <span>${week.label}  ·  ${week.dates}</span>
            ${isCurrent ? '<span class="current-badge">THIS WEEK</span>' : ''}
          </div>
          <div class="schedule-week-days">${dayItems}</div>
        </div>
      `;
    }).join('');

    return `
      <div class="schedule-phase">
        <div class="phase-header phase-${phase.cls}">
          <div class="phase-dot dot-${phase.cls}"></div>
          <div class="phase-title">${phase.label}</div>
          <div class="phase-dates">${phase.dates}</div>
        </div>
        <div class="phase-weeks">${weeksHtml}</div>
      </div>
    `;
  }).join('');

  document.getElementById('schedule-content').innerHTML = html;
}

function renderTrips() {
  const today = getToday();

  const trips = [
    {
      name: 'Indian Peaks Wilderness',
      subtitle: 'Brainard Lake Counterclockwise Loop',
      start: new Date(2026, 6, 26),
      end: new Date(2026, 6, 29),
      details: [
        { label: 'Trailhead', value: 'Brainard Lake, CO' },
        { label: 'Direction', value: 'Counterclockwise loop' },
        { label: 'Elevation', value: '10,000 – 12,500 ft' },
        { label: 'Duration', value: '4 days on trail' },
        { label: 'Drive up', value: 'July 24 (overnight Denver/Boulder)' },
        { label: 'Start hike', value: 'July 26' },
        { label: 'Return to car', value: 'July 29' },
        { label: 'Drive home', value: 'July 30–31' },
      ],
      tips: 'Arrive at sea level 1–2 days before the hike. Overnight in Denver or Boulder (5,400 ft) on July 24. Drink 4+ liters of water daily the first two days. Start slow on Day 1.',
      badge: 'TRIP 1',
      color: '#1B4332'
    },
    {
      name: 'Trans-Sierra Expedition',
      subtitle: 'TSX Outfitter — High-Altitude Traverse',
      start: new Date(2026, 7, 21),
      end: new Date(2026, 7, 29),
      details: [
        { label: 'Outfitter', value: 'TSX' },
        { label: 'Elevation', value: '11,000 – 13,000+ ft' },
        { label: 'Duration', value: '9 days on trail' },
        { label: 'Start date', value: 'August 21' },
        { label: 'End date', value: 'August 29' },
        { label: 'Difficulty', value: 'High — longest & highest trip' },
      ],
      tips: 'Higher and longer than Indian Peaks. Your body retains some acclimatization from July but it fades in 3–4 weeks. Start conservatively on Day 1. Communicate with TSX guides about how you feel.',
      badge: 'TRIP 2',
      color: '#1B4332'
    }
  ];

  const html = trips.map(trip => {
    const now = today.getTime();
    const start = trip.start.getTime();
    const end = trip.end.getTime();
    let countdownHtml = '';

    if (now < start) {
      const days = getDaysBetween(today, trip.start);
      const weeks = Math.floor(days / 7);
      const remDays = days % 7;
      countdownHtml = `
        <div class="trip-countdown">
          ${weeks > 0 ? `<div class="countdown-item"><div class="countdown-num">${weeks}</div><div class="countdown-label">weeks</div></div>` : ''}
          ${remDays > 0 || weeks === 0 ? `<div class="countdown-item"><div class="countdown-num">${remDays}</div><div class="countdown-label">days</div></div>` : ''}
          <div class="countdown-item" style="align-self:flex-end;padding-bottom:4px">
            <div style="font-size:13px;color:var(--mist)">until the trailhead</div>
          </div>
        </div>`;
    } else if (now >= start && now <= end) {
      countdownHtml = `<div style="margin-top:14px;font-size:18px;color:var(--amber);font-family:'Playfair Display',serif;font-weight:700">YOU'RE ON TRAIL RIGHT NOW 🏔️</div>`;
    } else {
      countdownHtml = `<div style="margin-top:14px;font-size:14px;color:var(--mist)">Trip completed ✓</div>`;
    }

    const detailRows = trip.details.map(d =>
      `<div class="trip-detail-row"><span class="trip-detail-label">${d.label}</span><span class="trip-detail-value">${d.value}</span></div>`
    ).join('');

    return `
      <div class="trip-card">
        <div class="trip-card-hero">
          <div class="trip-badge">${trip.badge}</div>
          <div class="trip-name">${trip.name}</div>
          <div class="trip-dates">${trip.subtitle}</div>
          ${countdownHtml}
        </div>
        <div class="trip-card-details">
          ${detailRows}
          <div class="tips-card" style="margin-top:12px;margin-bottom:0;background:#f8f9ff;">
            <div class="tips-title">⛰ Altitude Reminder</div>
            <div class="tips-text">${trip.tips}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('trips-content').innerHTML = html;
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.target.classList.add('active');

  if (name === 'week') renderWeek();
  if (name === 'schedule') renderSchedule();
  if (name === 'trips') renderTrips();
}

renderHeader();
renderToday();

</script>
